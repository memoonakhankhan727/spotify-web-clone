<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <title>Spotify - Web Player: Music for everyone</title>
</head>

<body>
    <div class="container flex bg-black">
        <div class="left">
            <div class="close">
                <img width="30" class="invert" src="close.svg" alt="">
            </div>

            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo">
                    <img width="110" class="invert" src="logo.svg" alt="">
                </div>

                <ul>
                    <li><img class="invert" src="home.svg" alt="home">Home</li>
                    <li><img class="invert" src="search.svg" alt="home">Search</li>
                </ul>
            </div>

            <div class="library bg-grey rounded m-1 p-1">
                <div class="heading">
                    <img class="invert" src="playlist.svg" alt="">
                    <h2>Your Library</h2>
                </div>

                <div class="songList">
                    <ul></ul>
                </div>

                <div class="footer">
        <a href="https://www.spotify.com/jp/legal/">Legal</a>
        <a href="https://www.spotify.com/jp/privacy/">Privacy Center</a>
        <a href="https://www.spotify.com/jp/legal/privacy-policy/">Privacy Policy</a>
        <a href="https://www.spotify.com/jp/legal/cookies-policy/">Cookies</a>
        <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3">About Ads</a>
        <a href="https://www.spotify.com/jp/accessibility/">Accessibility</a>
      </div>
            </div>
        </div>

        <div class="right bg-grey rounded">

            <div class="header">
                <div class="nav">
                    <div class="hamburgerContainer">
                        <img width="40" class="invert hamburger" src="humbuger.svg" alt="">
                    </div>
                </div>

                <div class="buttons">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>

            <div class="spotifyPlaylists">
                <h1>Spotify Playlists</h1>

                <!-- ✅ FIX: cardContainer now ready for JS -->
                <div class="cardContainer">

                    <!-- TEMP TEST CARD (remove later if JS works) -->
                    <div class="card">
                    </div>

                </div>
                 <div class="card">
                    </div>
                    

                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>

                    <div class="abovebar">

                        <div class="songinfo"></div>

                        <div class="songbuttons">
                            <img width="35" id="previous" src="presong.svg" alt="">
                            <img width="35" id="play" src="play.svg" alt="">
                            <img width="35" id="next" src="nextsong.svg" alt="">
                        </div>

                        <div class="timevol">

                            <div class="songtime"></div>

                            <div class="volume">
                                <img width="25" src="volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume">
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
